openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Telegram Accounts Shop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Telegram account management
  - name: orders
    description: Order management
  - name: categories
    description: Account categories
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all account categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [available, sold, reserved]
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Upload a new account (tdata zip)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts/upload:
    post:
      operationId: uploadAccountFile
      tags: [accounts]
      summary: Upload tdata zip file for an account (multipart/form-data, handled by server directly)
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResult"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, delivered, cancelled, refunded]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (from bot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/deliver/{id}:
    post:
      operationId: deliverOrder
      tags: [orders]
      summary: Manually trigger account delivery for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [stats]
      summary: Get recent orders feed
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /lolz/accounts:
    get:
      operationId: lolzSearchAccounts
      tags: [stats]
      summary: Search Telegram accounts on LolzTeam Market
      parameters:
        - name: pmin
          in: query
          schema:
            type: number
        - name: pmax
          in: query
          schema:
            type: number
        - name: count
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of LolzTeam accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LolzAccount"
        "400":
          description: No API key configured

  /lolz/import/{itemId}:
    post:
      operationId: lolzImportAccount
      tags: [stats]
      summary: Buy an account from LolzTeam and add to inventory
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [price]
              properties:
                price:
                  type: number
                categoryId:
                  type: integer
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LolzImportResult"
        "400":
          description: Error

  /bot/settings:
    get:
      operationId: getBotSettings
      tags: [stats]
      summary: Get bot settings
      responses:
        "200":
          description: Bot settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    patch:
      operationId: updateBotSettings
      tags: [stats]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    Account:
      type: object
      required: [id, status, price, createdAt]
      properties:
        id:
          type: integer
        phone:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, sold, reserved]
        price:
          type: number
        filePath:
          type: ["string", "null"]
        fileName:
          type: ["string", "null"]
        isFree:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        soldAt:
          type: ["string", "null"]
          format: date-time

    AccountInput:
      type: object
      required: [price]
      properties:
        phone:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        price:
          type: number
        filePath:
          type: string
        fileName:
          type: string
        isFree:
          type: string
          enum: ["true", "false"]

    AccountPatch:
      type: object
      properties:
        phone:
          type: string
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
        status:
          type: string
          enum: [available, sold, reserved]

    FileUploadResult:
      type: object
      required: [filePath, fileName]
      properties:
        filePath:
          type: string
        fileName:
          type: string
        accountId:
          type: ["integer", "null"]

    Order:
      type: object
      required: [id, telegramUserId, status, paymentMethod, amount, createdAt]
      properties:
        id:
          type: integer
        telegramUserId:
          type: string
        telegramUsername:
          type: ["string", "null"]
        accountId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, paid, delivered, cancelled, refunded]
        paymentMethod:
          type: string
          enum: [yookassa, stars, crypto, free]
        amount:
          type: number
        paymentId:
          type: ["string", "null"]
        deliveredAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        accountPhone:
          type: ["string", "null"]
        accountFileName:
          type: ["string", "null"]

    OrderInput:
      type: object
      required: [telegramUserId, paymentMethod, amount]
      properties:
        telegramUserId:
          type: string
        telegramUsername:
          type: string
        accountId:
          type: integer
        paymentMethod:
          type: string
          enum: [yookassa, stars, crypto, free]
        amount:
          type: number
        paymentId:
          type: string

    OrderPatch:
      type: object
      properties:
        status:
          type: string
          enum: [pending, paid, delivered, cancelled, refunded]
        paymentId:
          type: string
        accountId:
          type: integer

    DashboardStats:
      type: object
      required: [totalAccounts, availableAccounts, soldAccounts, totalOrders, pendingOrders, totalRevenue, todayRevenue]
      properties:
        totalAccounts:
          type: integer
        availableAccounts:
          type: integer
        soldAccounts:
          type: integer
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number
        todayRevenue:
          type: number

    BotSettings:
      type: object
      required: [id, botToken, welcomeMessage, paymentYookassaEnabled, paymentStarsEnabled, paymentCryptoEnabled]
      properties:
        id:
          type: integer
        botToken:
          type: string
        welcomeMessage:
          type: string
        supportUsername:
          type: ["string", "null"]
        paymentYookassaEnabled:
          type: boolean
        yookassaShopId:
          type: ["string", "null"]
        yookassaSecretKey:
          type: ["string", "null"]
        paymentStarsEnabled:
          type: boolean
        paymentCryptoEnabled:
          type: boolean
        cryptoBotToken:
          type: ["string", "null"]
        lolzApiKey:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    BotSettingsInput:
      type: object
      properties:
        botToken:
          type: string
        welcomeMessage:
          type: string
        supportUsername:
          type: string
        paymentYookassaEnabled:
          type: boolean
        yookassaShopId:
          type: string
        yookassaSecretKey:
          type: string
        paymentStarsEnabled:
          type: boolean
        paymentCryptoEnabled:
          type: boolean
        cryptoBotToken:
          type: string
        lolzApiKey:
          type: string

    LolzAccount:
      type: object
      required: [itemId, price, title]
      properties:
        itemId:
          type: integer
        price:
          type: number
        title:
          type: string
        phone:
          type: ["string", "null"]
        registrationDate:
          type: ["string", "null"]

    LolzImportResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        accountId:
          type: ["integer", "null"]
