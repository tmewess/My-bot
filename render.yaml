services:
  - type: web
    name: voidaccount-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voidaccount-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: SHOP_URL
        sync: false
      - key: ADMIN_URL
        sync: false

  - type: web
    name: voidaccount-shop
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/tg-shop run build
    startCommand: npx serve -s artifacts/tg-shop/dist -l $PORT
    plan: free

  - type: web
    name: voidaccount-admin
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin-panel run build
    startCommand: npx serve -s artifacts/admin-panel/dist -l $PORT
    plan: free

databases:
  - name: voidaccount-db
    plan: free
